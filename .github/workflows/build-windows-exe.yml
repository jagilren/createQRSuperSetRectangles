name: Compilar ejecutable Windows (.exe)

# Cuándo se ejecuta:
# - En cada push a master (para tener siempre el .exe más reciente).
# - Manualmente desde la pestaña "Actions" (botón "Run workflow").
# - Al crear una etiqueta vX.Y.Z, además publica el .exe en una Release.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Runner de Windows en la nube de GitHub (aquí SÍ se puede generar el .exe).
    runs-on: windows-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias y PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Compilar el ejecutable
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name "GeneradorEtiquetasQR"
          --add-data "cliente.png;."
          --add-data "LOGO_RPCI.jpg;."
          gui.py

      - name: Subir el .exe como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: GeneradorEtiquetasQR-windows
          path: dist/GeneradorEtiquetasQR.exe
          if-no-files-found: error

      # Si el push fue de una etiqueta vX.Y.Z, además publica el .exe en Releases.
      - name: Publicar en Release (solo en etiquetas v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GeneradorEtiquetasQR.exe
