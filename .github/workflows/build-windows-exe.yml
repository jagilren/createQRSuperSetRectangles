name: Compilar ejecutable Windows (.exe)

# Cuándo se ejecuta:
# - En cada push a master (para tener siempre el .exe más reciente).
# - Manualmente desde la pestaña "Actions" (botón "Run workflow").
# - Al crear una etiqueta vX.Y.Z, además publica el .exe en una Release.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Runner de Windows en la nube de GitHub (aquí SÍ se puede generar el .exe).
    runs-on: windows-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias y PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # Modo carpeta (--onedir): mucho menos falsos positivos de antivirus y
      # sin requerir permisos de administrador (mejor para máquinas controladas).
      - name: Compilar la aplicación (modo carpeta)
        run: >
          pyinstaller --noconfirm --onedir --windowed
          --name "GeneradorEtiquetasQR"
          --add-data "cliente.png;."
          --add-data "LOGO_RPCI.jpg;."
          gui.py

      # El artefacto de Actions se descarga como .zip con la carpeta completa.
      - name: Subir la aplicación como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: GeneradorEtiquetasQR-windows
          path: dist/GeneradorEtiquetasQR/
          if-no-files-found: error

      # Para Releases se necesita un único archivo: comprimimos la carpeta.
      - name: Comprimir la carpeta en un .zip (solo en etiquetas v*)
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path dist/GeneradorEtiquetasQR/* -DestinationPath GeneradorEtiquetasQR-windows.zip
        shell: pwsh

      - name: Publicar en Release (solo en etiquetas v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GeneradorEtiquetasQR-windows.zip
